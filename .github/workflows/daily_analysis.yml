name: Daily AI Analysis

on:
  schedule:
    # Runs every day at 07:00 UTC (09:00 Sofia time)
    - cron: "0 7 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate AI analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_analysis.py

      - name: Commit and push updated matchday.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matchday.json
          git diff --cached --quiet || git commit -m "chore: auto-update AI analysis [$(date +%Y-%m-%d)]"
          git push
