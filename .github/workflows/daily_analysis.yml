name: Daily Update

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 07:00 Sofia time
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check match results (football-data.org + api-football)
        continue-on-error: true
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python fetch_results.py

      - name: Generate AI analysis (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_analysis.py

      - name: Refresh live odds (William Hill)
        continue-on-error: true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # the-odds-api.com (EPL)
          OAIO_API_KEY: ${{ secrets.OAIO_API_KEY }}   # odds-api.io (UEFA + expansion)
        run: python fetch_odds.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matchday.json data/live_odds.json
          git diff --cached --quiet || git commit -m "chore: daily update [$(date +%Y-%m-%d)]"
          git pull --rebase
          git push
